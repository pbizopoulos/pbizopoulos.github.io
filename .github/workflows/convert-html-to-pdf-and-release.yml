name: convert-html-to-pdf-and-release
on:
  push:
    paths:
      - '.github/workflows/convert-html-to-pdf-and-release.yml'
      - 'curriculum-vitae.html'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v3
      - name: install wkhtmltopdf and convert html to pdf
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf
          wkhtmltopdf curriculum-vitae.html curriculum-vitae.pdf
      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Release curriculum-vitae.pdf"
          files: curriculum-vitae.pdf
